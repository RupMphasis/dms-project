# =============================================
# SERVER
# =============================================
server.port=8082
spring.application.name=user-service

# =============================================
# MYSQL
# Spring Boot 3.x — driver is auto-detected, no need to set it manually
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/dms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root@39

# =============================================
# JPA / HIBERNATE
# Spring Boot 3.x — dialect is auto-detected for MySQL 8
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# EUREKA CLIENT
# =============================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# =============================================
# SERVICE URLS (override from Eureka when available)
# =============================================
product.service.url=http://localhost:8084
order.service.url=http://localhost:8083
inventory.service.url=http://localhost:8085
audit.service.url=http://localhost:8086