<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Audit Logs</title>
</head>
<body>
    <h1>Audit Logs</h1>
    <p>
        <a href="/users/admin/dashboard">Back to Dashboard</a> |
        <a href="/users/admin/products">Manage Products</a> |
        <a href="/users/admin/orders">View Orders</a> |
        <a href="/users/logout">Logout</a>
    </p>
    <p>
        Show:
        <a th:href="@{/users/admin/audit}">All</a> |
        <a th:href="@{/users/admin/audit(targetType='ORDER')}">Orders</a> |
        <a th:href="@{/users/admin/audit(targetType='PRODUCT')}">Products</a> |
        <a th:href="@{/users/admin/audit(targetType='USER')}">Users</a>
    </p>
    <form th:action="@{/users/admin/audit}" method="get" style="margin-bottom: 1rem;">
        <label>
            Target Type:
            <select name="targetType">
                <option th:value="" th:selected="${selectedType == 'ALL'}">All</option>
                <option th:value="USER" th:selected="${selectedType == 'USER'}">User / Distributor</option>
                <option th:value="ORDER" th:selected="${selectedType == 'ORDER'}">Order</option>
                <option th:value="PRODUCT" th:selected="${selectedType == 'PRODUCT'}">Product</option>
            </select>
        </label>
        <label>
            Target ID:
            <input type="text" name="targetId" placeholder="e.g. 1 or 101" th:value="${selectedId}" />
        </label>
        <button type="submit">Filter</button>
        <a th:href="@{/users/admin/audit}">Reset</a>
    </form>
    <div th:if="${selectedType}">
        <strong th:text="'Showing ' + ${selectedType} + ' logs'"></strong>
    </div>
    <div th:if="${selectedId}">
        <em th:text="'Filtered by target ID: ' + ${selectedId}"></em>
    </div>
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Event Type</th>
                <th>Actor</th>
                <th>Target Type</th>
                <th>Target ID</th>
                <th>Details</th>
                <th>Timestamp</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="event : ${events}">
                <td th:text="${event.id}"></td>
                <td th:text="${event.eventType}"></td>
                <td th:text="${event.actor}"></td>
                <td th:text="${event.targetType}"></td>
                <td th:text="${event.targetId}"></td>
                <td th:text="${event.details}"></td>
                <td th:text="${event.timestamp}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
