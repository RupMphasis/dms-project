<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Profile</title>
</head>
<body>
    <h1>Admin Profile</h1>
    <div th:if="${error}" style="color: red;">
        <p th:text="${error}"></p>
    </div>
    <div th:if="${message}" style="color: green;">
        <p th:text="${message}"></p>
    </div>
    <form th:action="@{/users/admin/profile}" th:object="${profile}" method="post">
        <p><strong>Username:</strong> <span th:text="${profile.username}"></span></p>
        <label for="fullName">Full Name:</label>
        <input type="text" id="fullName" th:field="*{fullName}" required><br/><br/>

        <label for="email">Email:</label>
        <input type="email" id="email" th:field="*{email}"><br/><br/>

        <h3>Change Password</h3>
        <label for="oldPassword">Old Password:</label>
        <input type="password" id="oldPassword" th:field="*{oldPassword}"><br/><br/>

        <label for="newPassword">New Password:</label>
        <input type="password" id="newPassword" th:field="*{newPassword}"><br/><br/>

        <label for="confirmNewPassword">Confirm New Password:</label>
        <input type="password" id="confirmNewPassword" th:field="*{confirmNewPassword}"><br/><br/>

        <button type="submit">Save Profile</button>
    </form>

    <p>
        <a href="/users/admin/dashboard">Back to Admin Dashboard</a>
    </p>
</body>
</html>
