<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Order Management</title>
</head>
<body>
    <h1>Orders</h1>
    <div th:if="${message}" style="color: green;">
        <p th:text="${message}"></p>
    </div>
    <div th:if="${error}" style="color: red;">
        <p th:text="${error}"></p>
    </div>
    <div>
        <form th:action="@{/users/admin/orders}" method="get">
            <label for="distributorId">Filter by distributor:</label>
            <select name="distributorId" id="distributorId">
                <option value="" th:selected="${selectedDistributorId == null}">All Distributors</option>
                <option th:each="d : ${distributors}"
                        th:value="${d.userId}"
                        th:text="${d.name + ' (' + d.username + ')'}"
                        th:selected="${d.userId == selectedDistributorId}"></option>
            </select>
            <button type="submit">Filter</button>
        </form>
    </div>
    <div th:if="${orders}">
        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Product ID</th>
                    <th>Distributor ID</th>
                    <th>Quantity</th>
                    <th>Status</th>
                    <th>Fulfilled</th>
                    <th>Pending</th>
                    <th>ETA Days</th>
                    <th>Customer Message</th>
                    <th>Admin Response</th>
                    <th>Created</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="o : ${orders}">
                    <td th:text="${o.id}"></td>
                    <td th:text="${o.productId}"></td>
                    <td th:text="${o.distributorId}"></td>
                    <td th:text="${o.quantity}"></td>
                    <td th:text="${o.status}"></td>
                    <td th:text="${o.fulfilledQuantity}"></td>
                    <td th:text="${o.pendingQuantity}"></td>
                    <td th:text="${o.estimatedFulfillmentDays}"></td>
                    <td th:text="${o.customMessage}"></td>
                    <td th:text="${o.adminMessage}"></td>
                    <td th:text="${o.createdAt}"></td>
                    <td>
                        <div th:if="${o.status == 'PENDING_APPROVAL'}">
                            <form method="post">
                                <textarea name="adminMessage" rows="2" cols="20" placeholder="Response message"></textarea><br/>
                                <button type="submit" th:formaction="@{/users/admin/orders/{id}/approve(id=${o.id})}">Approve</button>
                                <button type="submit" th:formaction="@{/users/admin/orders/{id}/deny(id=${o.id})}" style="margin-left: 4px;">Deny</button>
                            </form>
                        </div>
                        <div th:if="${o.status != 'PENDING_APPROVAL'}">
                            <form th:action="@{/users/admin/orders/{id}/delete(id=${o.id})}" method="post">
                                <button type="submit">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <p>
        <a href="/users/admin/dashboard">Back to Admin Dashboard</a> |
        <a href="/users/admin/products">Manage Products</a> |
        <a href="/users/admin/audit">Audit Logs</a> |
        <a href="/users/logout">Logout</a>
    </p>
</body>
</html>
