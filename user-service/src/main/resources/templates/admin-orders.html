<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Order Management</title>
</head>
<body>
    <h1>Orders</h1>
    <div th:if="${message}" style="color: green;">
        <p th:text="${message}"></p>
    </div>
    <div th:if="${error}" style="color: red;">
        <p th:text="${error}"></p>
    </div>
    <div th:if="${orders}">
        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Product ID</th>
                    <th>Distributor ID</th>
                    <th>Quantity</th>
                    <th>Status</th>
                    <th>Created</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="o : ${orders}">
                    <td th:text="${o.id}"></td>
                    <td th:text="${o.productId}"></td>
                    <td th:text="${o.distributorId}"></td>
                    <td th:text="${o.quantity}"></td>
                    <td th:text="${o.status}"></td>
                    <td th:text="${o.createdAt}"></td>
                    <td>
                        <form th:action="@{/users/admin/orders/{id}/approve(id=${o.id})}" method="post" th:if="${o.status} == 'PENDING_APPROVAL'">
                            <button type="submit">Approve</button>
                        </form>
                        <form th:action="@{/users/admin/orders/{id}/delete(id=${o.id})}" method="post" style="display: inline-block; margin-left: 4px;">
                            <button type="submit">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <p>
        <a href="/users/admin/dashboard">Back to Admin Dashboard</a> |
        <a href="/users/admin/products">Manage Products</a> |
        <a href="/users/admin/audit">Audit Logs</a> |
        <a href="/users/logout">Logout</a>
    </p>
</body>
</html>
