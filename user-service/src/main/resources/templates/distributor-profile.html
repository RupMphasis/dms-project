<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Distributor Profile</title>
</head>
<body>
    <h1>Distributor Profile</h1>
    <div th:if="${error}" style="color: red;">
        <p th:text="${error}"></p>
    </div>
    <div th:if="${message}" style="color: green;">
        <p th:text="${message}"></p>
    </div>
    <form th:action="@{/users/distributor/profile}" th:object="${profile}" method="post">
        <input type="hidden" th:field="*{distributorId}" />
        <p><strong>Username:</strong> <span th:text="${profile.username}"></span></p>
        <label for="name">Name:</label>
        <input type="text" id="name" th:field="*{name}" required><br/><br/>

        <label for="email">Email:</label>
        <input type="email" id="email" th:field="*{email}" required><br/><br/>

        <label for="city">City:</label>
        <input type="text" id="city" th:field="*{city}" required><br/><br/>

        <label for="contact">Contact:</label>
        <input type="text" id="contact" th:field="*{contact}" required><br/><br/>

        <h3>Change Password</h3>
        <label for="oldPassword">Old Password:</label>
        <input type="password" id="oldPassword" th:field="*{oldPassword}"><br/><br/>

        <label for="newPassword">New Password:</label>
        <input type="password" id="newPassword" th:field="*{newPassword}"><br/><br/>

        <label for="confirmNewPassword">Confirm New Password:</label>
        <input type="password" id="confirmNewPassword" th:field="*{confirmNewPassword}"><br/><br/>

        <button type="submit">Save Profile</button>
    </form>

    <p>
        <a href="/users/distributor/dashboard">Back to Distributor Dashboard</a>
    </p>
</body>
</html>
