<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Distributor</title>
</head>
<body>
    <h1>Edit Distributor</h1>
    <div th:if="${error}" style="color: red;">
        <p th:text="${error}"></p>
    </div>
    <div th:if="${message}" style="color: green;">
        <p th:text="${message}"></p>
    </div>
    <form th:action="@{/users/admin/distributors/{id}/edit(id=${distributorUserId})}" th:object="${distributor}" method="post">
        <input type="hidden" th:field="*{distributorId}" />
        <p><strong>Username:</strong> <span th:text="${username}"></span></p>
        <label for="name">Name:</label>
        <input type="text" id="name" th:field="*{name}" required><br/><br/>

        <label for="email">Email:</label>
        <input type="email" id="email" th:field="*{email}" required><br/><br/>

        <label for="city">City:</label>
        <input type="text" id="city" th:field="*{city}" required><br/><br/>

        <label for="contact">Contact:</label>
        <input type="text" id="contact" th:field="*{contact}" required><br/><br/>

        <button type="submit">Save Distributor</button>
    </form>

    <p>
        <a href="/users/admin/dashboard">Back to Admin Dashboard</a>
    </p>
</body>
</html>
