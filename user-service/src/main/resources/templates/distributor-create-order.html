<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Order</title>
</head>
<body>
    <h1>Place New Order</h1>

    <div th:if="${message}" style="color: green;">
        <p th:text="${message}"></p>
    </div>
    <div th:if="${error}" style="color: red;">
        <p th:text="${error}"></p>
    </div>

    <form th:action="@{/users/distributor/order/create}" th:object="${orderCreateDto}" method="post">
        <input type="hidden" th:field="*{distributorId}" />
        <p style="color: blue;">Orders placed here are sent for admin approval and may request quantities beyond current stock.</p>
        <label>Product ID: </label>
        <input type="number" th:field="*{productId}" required/><br/><br/>
        <label>Quantity: </label>
        <input type="number" th:field="*{quantity}" required min="1"/><br/><br/>
        <div>
            <label>Name: </label>
            <input type="text" th:field="*{customerName}" required/><br/><br/>
        </div>
        <div>
            <label>Phone: </label>
            <input type="text" th:field="*{customerPhone}" required/><br/><br/>
        </div>
        <div>
            <label>Address: </label>
            <textarea th:field="*{shippingAddress}" rows="3" cols="40" required></textarea><br/><br/>
        </div>
        <div>
            <label>City: </label>
            <input type="text" th:field="*{shippingCity}" required/><br/><br/>
        </div>
        <div>
            <label>Postal Code: </label>
            <input type="text" th:field="*{shippingPostalCode}" required/><br/><br/>
        </div>
        <button type="submit">Submit Order</button>
    </form>

    <p>
        <a href="/users/distributor/orders">View My Orders</a> |
        <a href="/users/distributor/dashboard">Back</a> |
        <a href="/users/logout">Logout</a>
    </p>
</body>
</html>
