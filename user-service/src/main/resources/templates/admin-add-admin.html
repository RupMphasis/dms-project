<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Admin</title>
</head>
<body>
    <h1>Add New Admin</h1>
    <div th:if="${error}" style="color: red;">
        <p th:text="${error}"></p>
    </div>
    <div th:if="${message}" style="color: green;">
        <p th:text="${message}"></p>
    </div>
    <form action="#" th:action="@{/users/admin/add-admin}" th:object="${registerRequest}" method="post">
        <input type="hidden" name="role" value="ADMIN" />
        <label for="username">Username:</label>
        <input type="text" id="username" th:field="*{username}" required><br><br>

        <label for="fullName">Full Name:</label>
        <input type="text" id="fullName" th:field="*{fullName}" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" th:field="*{email}" required><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" th:field="*{password}" required><br><br>

        <label for="confirmPassword">Confirm Password:</label>
        <input type="password" id="confirmPassword" th:field="*{confirmPassword}" required><br><br>

        <button type="submit">Create Admin</button>
    </form>

    <p><a href="/users/admin/dashboard">Back to Dashboard</a></p>
</body>
</html>
