<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Distributor Products</title>
</head>
<body>
    <h1>Available Products</h1>

    <div th:if="${message}" style="color: green;">
        <p th:text="${message}"></p>
    </div>
    <div th:if="${error}" style="color: red;">
        <p th:text="${error}"></p>
    </div>

    <p>
        <a href="/users/distributor/cart">View Cart (<span th:text="${cartSize}">0</span>)</a> |
        <a href="/users/distributor/orders">My Orders</a> |
        <a href="/users/distributor/dashboard">Dashboard</a> |
        <a href="/users/logout">Logout</a>
    </p>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Vehicle Type</th>
                <th>Size</th>
                <th>Description</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${products}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.name}"></td>
                <td th:text="${p.vehicleType}"></td>
                <td th:text="${p.size}"></td>
                <td th:text="${p.description}"></td>
                <td th:text="${p.price}"></td>
                <td th:text="${p.stock}"></td>
                <td>
                    <form th:action="@{/users/distributor/products/{id}/add(id=${p.id})}" method="post" style="display:inline;">
                        <input type="number" name="quantity" min="1" th:max="${p.stock}" value="1" required/>
                        <button type="submit">Add to Cart</button>
                    </form>
                    <form th:action="@{/users/distributor/order/checkout}" method="get" style="display:inline; margin-left: 8px;">
                        <input type="hidden" name="productId" th:value="${p.id}" />
                        <input type="number" name="quantity" min="1" th:max="${p.stock}" value="1" required/>
                        <button type="submit">Buy Now</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
