spring.application.name=order-service
server.port=8083

# Eureka Client configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Actuator endpoints
management.endpoints.web.exposure.include=*

#use you own database:
spring.datasource.url=jdbc:mysql://localhost:3306/dms_db
spring.datasource.username=root
spring.datasource.password=root@39

inventory.service.url=http://localhost:8085
product.service.url=http://localhost:8084
audit.service.url=http://localhost:8086

# auto-create/upgrade tables for entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true